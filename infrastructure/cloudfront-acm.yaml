AWSTemplateFormatVersion: "2010-09-09"
Description: >
  ACM certificate (DNS validation) and CloudFront distribution in front of the
  S3 bucket (REST API + Origin Access Control) for alainavasquez.com. Deploy this
  stack to us-east-1 only (ACM for CloudFront must live in us-east-1). Requires a
  Route 53 public hosted zone for the domain in this AWS account. After deploy,
  run scripts/configure-s3-website-redirect.ps1 so the S3 website endpoint URL
  redirects browsers to https://alainavasquez.com/.

Parameters:
  DomainName:
    Type: String
    Default: alainavasquez.com
    Description: Apex domain (must match your Route 53 hosted zone name).

  HostedZoneId:
    Type: String
    Description: >
      Route 53 hosted zone ID for the domain (e.g. Z0123456789ABCDEFGHIJ).
      The zone must exist in this account so ACM can create validation CNAMEs.

  SiteBucketName:
    Type: String
    Default: alainavasquez-com-web-prod
    Description: >
      Existing S3 bucket name (us-east-1) that holds the static site objects.
      CloudFront reads via the regional REST endpoint; OAC signs requests.

  EnableLegacyPublicRead:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: >
      Prefer false: OAC-only bucket access. If true, also allows public s3:GetObject
      (legacy migration only).

  PriceClass:
    Type: String
    Default: PriceClass_100
    AllowedValues:
      - PriceClass_100
      - PriceClass_200
      - PriceClass_All
    Description: CloudFront edge locations (100 = US/Europe, lowest cost).

  IncludeWwwHostname:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: >
      If true, ACM and CloudFront include www.<DomainName> (two DNS validations).
      Set false if www validation stalls; you can update the stack later to add www.

Conditions:
  LegacyPublicReadEnabled: !Equals [!Ref EnableLegacyPublicRead, "true"]
  LegacyPublicReadDisabled: !Equals [!Ref EnableLegacyPublicRead, "false"]
  WwwHostnameEnabled: !Equals [!Ref IncludeWwwHostname, "true"]

Resources:
  Certificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref DomainName
      SubjectAlternativeNames: !If
        - WwwHostnameEnabled
        - - !Sub "www.${DomainName}"
        - !Ref AWS::NoValue
      ValidationMethod: DNS
      DomainValidationOptions: !If
        - WwwHostnameEnabled
        - - DomainName: !Ref DomainName
            HostedZoneId: !Ref HostedZoneId
          - DomainName: !Sub "www.${DomainName}"
            HostedZoneId: !Ref HostedZoneId
        - - DomainName: !Ref DomainName
            HostedZoneId: !Ref HostedZoneId

  SiteOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-s3-oac"
        Description: OAC for S3 REST origin
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  SiteSecurityHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub "${AWS::StackName}-security-headers"
        Comment: CSP, HSTS (short phase), nosniff, frame deny, referrer policy
        SecurityHeadersConfig:
          ContentTypeOptions:
            Override: true
          FrameOptions:
            FrameOption: DENY
            Override: true
          ReferrerPolicy:
            ReferrerPolicy: strict-origin-when-cross-origin
            Override: true
          StrictTransportSecurity:
            AccessControlMaxAgeSec: 300
            IncludeSubdomains: true
            Override: true
            Preload: false
          ContentSecurityPolicy:
            ContentSecurityPolicy: "default-src 'none'; base-uri 'none'; frame-ancestors 'none'; img-src 'self' https:; style-src 'self'; font-src 'self'; form-action 'none'; upgrade-insecure-requests"
            Override: true
        CustomHeadersConfig:
          Items:
            - Header: Permissions-Policy
              Value: accelerometer=(), camera=(), geolocation=(), microphone=(), payment=(), usb=()
              Override: true

  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucketName
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          !If
            - LegacyPublicReadEnabled
            - - Sid: PublicReadGetObject
                Effect: Allow
                Principal: "*"
                Action: "s3:GetObject"
                Resource: !Sub "arn:aws:s3:::${SiteBucketName}/*"
              - Sid: AllowCloudFrontServicePrincipal
                Effect: Allow
                Principal:
                  Service: cloudfront.amazonaws.com
                Action: "s3:GetObject"
                Resource: !Sub "arn:aws:s3:::${SiteBucketName}/*"
                Condition:
                  StringEquals:
                    "AWS:SourceArn": !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${SiteDistribution}"
            - - Sid: AllowCloudFrontServicePrincipal
                Effect: Allow
                Principal:
                  Service: cloudfront.amazonaws.com
                Action: "s3:GetObject"
                Resource: !Sub "arn:aws:s3:::${SiteBucketName}/*"
                Condition:
                  StringEquals:
                    "AWS:SourceArn": !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${SiteDistribution}"

  SiteBucketPublicAccessBlock:
    Type: AWS::S3::BucketPublicAccessBlock
    Condition: LegacyPublicReadDisabled
    DependsOn: SiteBucketPolicy
    Properties:
      Bucket: !Ref SiteBucketName
      BlockPublicAcls: true
      IgnorePublicAcls: true
      BlockPublicPolicy: true
      RestrictPublicBuckets: true

  SiteDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "HTTPS CDN for ${DomainName}"
        HttpVersion: http2and3
        IPV6Enabled: true
        DefaultRootObject: index.html
        Aliases: !If
          - WwwHostnameEnabled
          - - !Ref DomainName
            - !Sub "www.${DomainName}"
          - - !Ref DomainName
        Origins:
          - Id: S3RestOrigin
            DomainName: !Sub "${SiteBucketName}.s3.${AWS::Region}.amazonaws.com"
            OriginAccessControlId: !Ref SiteOriginAccessControl
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: S3RestOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          ResponseHeadersPolicyId: !Ref SiteSecurityHeadersPolicy
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
        PriceClass: !Ref PriceClass
        ViewerCertificate:
          AcmCertificateArn: !Ref Certificate
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021

  DnsApexA:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt SiteDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  DnsApexAAAA:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt SiteDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  DnsWwwA:
    Type: AWS::Route53::RecordSet
    Condition: WwwHostnameEnabled
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub "www.${DomainName}"
      Type: A
      AliasTarget:
        DNSName: !GetAtt SiteDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  DnsWwwAAAA:
    Type: AWS::Route53::RecordSet
    Condition: WwwHostnameEnabled
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub "www.${DomainName}"
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt SiteDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

Outputs:
  CertificateArn:
    Description: Issued ACM certificate ARN (us-east-1)
    Value: !Ref Certificate

  DistributionId:
    Description: CloudFront distribution ID
    Value: !Ref SiteDistribution

  DistributionDomainName:
    Description: CloudFront domain (*.cloudfront.net) — use for DNS alias target
    Value: !GetAtt SiteDistribution.DomainName

  SiteUrl:
    Description: Primary site URL
    Value: !Sub "https://${DomainName}/"
